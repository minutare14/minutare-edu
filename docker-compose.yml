services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ctia03-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      APP_URL: ${APP_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      APP_OWNER_EMAIL: ${APP_OWNER_EMAIL}
      APP_OWNER_PASSWORD: ${APP_OWNER_PASSWORD}
      APP_MEMBER_EMAIL: ${APP_MEMBER_EMAIL}
      APP_MEMBER_PASSWORD: ${APP_MEMBER_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${APP_PORT:-3010}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  db:
    image: postgres:16-alpine
    container_name: ctia03-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ctia03-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  ctia03-postgres-data:
