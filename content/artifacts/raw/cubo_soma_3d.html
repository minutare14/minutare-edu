
<style>
*{box-sizing:border-box;margin:0;padding:0}
#cb3{width:100%;height:420px;display:block;cursor:grab}
#cb3:active{cursor:grabbing}
.cbctrl{display:flex;gap:10px;flex-wrap:wrap;padding:.65rem 0;align-items:center}
.cbval{font-size:13px;font-weight:500;min-width:28px}
.cbbtn{background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:5px 13px;font-size:13px;color:var(--color-text-primary);cursor:pointer}
.cbbtn:hover,.cbbtn.on{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.cbinfo{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.6rem .9rem;font-size:13px;font-family:var(--font-mono);color:var(--color-text-primary);margin-top:4px}
</style>
<div id="cb3"></div>
<div class="cbctrl">
  <span style="font-size:13px;color:var(--color-text-secondary)">a =</span>
  <input type="range" id="cba" min="1" max="5" value="3" step="1" style="flex:1;max-width:180px" oninput="cbupd()">
  <span class="cbval" id="cbav">3</span>
  <span style="font-size:13px;color:var(--color-text-secondary);margin-left:8px">b =</span>
  <input type="range" id="cbb" min="1" max="4" value="2" step="1" style="flex:1;max-width:180px" oninput="cbupd()">
  <span class="cbval" id="cbbv">2</span>
  <button class="cbbtn on" onclick="setPieces(true)" id="cb-exp">Explodir peças</button>
  <button class="cbbtn" onclick="setPieces(false)" id="cb-col">Montar cubo</button>
</div>
<div class="cbinfo" id="cbinfo"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const cont=document.getElementById('cb3');
const W=cont.clientWidth,H=420;
const ren=new THREE.WebGLRenderer({antialias:true,alpha:true});
ren.setSize(W,H);ren.setPixelRatio(Math.min(devicePixelRatio,2));ren.setClearColor(0,0);
cont.appendChild(ren.domElement);
const sc=new THREE.Scene(),cm=new THREE.PerspectiveCamera(42,W/H,.1,200);
cm.position.set(8,9,16);cm.lookAt(2,2,2);
sc.add(new THREE.AmbientLight(0xffffff,.55));
const d1=new THREE.DirectionalLight(0xffffff,.85);d1.position.set(10,14,10);sc.add(d1);
const d2=new THREE.DirectionalLight(0x8899ff,.35);d2.position.set(-8,-6,-8);sc.add(d2);

const COLORS={
  a3:  {c:0x378ADD, name:'a³',      desc:'1 cubo a×a×a'},
  a2b: {c:0x1D9E75, name:'3a²b',    desc:'3 paralelepípedos a²×b'},
  ab2: {c:0xEF9F27, name:'3ab²',    desc:'3 paralelepípedos a×b²'},
  b3:  {c:0xE24B4A, name:'b³',      desc:'1 cubo b×b×b'},
};

let pieces=[],exploded=true;

function makePiece(sx,sy,sz,col,pos,explodeDir){
  const geo=new THREE.BoxGeometry(sx,sy,sz);
  const mat=new THREE.MeshPhongMaterial({color:col,transparent:true,opacity:.82,shininess:60});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(...pos);
  const eg=new THREE.EdgesGeometry(geo);
  const em=new THREE.LineSegments(eg,new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:.25}));
  mesh.add(em);
  sc.add(mesh);
  return{mesh,homePos:new THREE.Vector3(...pos),explodeDir:new THREE.Vector3(...explodeDir)};
}

function buildCube(a,b){
  pieces.forEach(p=>sc.remove(p.mesh));pieces=[];
  const h=a+b;
  const SCALE=4/h;
  const A=a*SCALE,B=b*SCALE,H2=h*SCALE;

  pieces.push(makePiece(A,A,A,COLORS.a3.c,[A/2,A/2,A/2],[-1,-1,-1]));
  pieces.push(makePiece(B,A,A,COLORS.a2b.c,[A+B/2,A/2,A/2],[1,-1,-1]));
  pieces.push(makePiece(A,B,A,COLORS.a2b.c,[A/2,A+B/2,A/2],[-1,1,-1]));
  pieces.push(makePiece(A,A,B,COLORS.a2b.c,[A/2,A/2,A+B/2],[-1,-1,1]));
  pieces.push(makePiece(A,B,B,COLORS.ab2.c,[A/2,A+B/2,A+B/2],[-1,1,1]));
  pieces.push(makePiece(B,A,B,COLORS.ab2.c,[A+B/2,A/2,A+B/2],[1,-1,1]));
  pieces.push(makePiece(B,B,A,COLORS.ab2.c,[A+B/2,A+B/2,A/2],[1,1,-1]));
  pieces.push(makePiece(B,B,B,COLORS.b3.c,[A+B/2,A+B/2,A+B/2],[1,1,1]));

  const a3v=a**3,a2b3v=3*a**2*b,ab23v=3*a*b**2,b3v=b**3;
  document.getElementById('cbinfo').textContent=
    `(${a}+${b})³ = a³ + 3a²b + 3ab² + b³ = ${a3v} + ${a2b3v} + ${ab23v} + ${b3v} = ${(a+b)**3}`;

  cbupd_legend(a,b,COLORS);
  if(exploded)setPieces(true,false);else setPieces(false,false);
}

function cbupd_legend(a,b,C){}

function setPieces(explode,rebuild=true){
  exploded=explode;
  document.getElementById('cb-exp').classList.toggle('on',explode);
  document.getElementById('cb-col').classList.toggle('on',!explode);
  const GAP=1.6;
  pieces.forEach(p=>{
    const target=explode?p.homePos.clone().add(p.explodeDir.clone().multiplyScalar(GAP)):p.homePos.clone();
    animateTo(p.mesh,target,600);
  });
}

function animateTo(mesh,target,dur){
  const start=mesh.position.clone();
  const t0=performance.now();
  function step(t){
    const frac=Math.min((t-t0)/dur,1);
    const ease=frac<.5?2*frac*frac:1-Math.pow(-2*frac+2,2)/2;
    mesh.position.lerpVectors(start,target,ease);
    if(frac<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

let rx=.42,ry=.6,drag=false,mx=0,my=0;
const el=ren.domElement;
el.addEventListener('mousedown',e=>{drag=true;mx=e.clientX;my=e.clientY;});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  ry+=(e.clientX-mx)*.009;rx+=(e.clientY-my)*.007;
  rx=Math.max(-1.3,Math.min(1.3,rx));mx=e.clientX;my=e.clientY;
});
el.addEventListener('wheel',e=>{cm.position.z=Math.max(8,Math.min(28,cm.position.z+e.deltaY*.015));e.preventDefault();},{passive:false});
el.addEventListener('touchstart',e=>{drag=true;mx=e.touches[0].clientX;my=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchend',()=>drag=false);
window.addEventListener('touchmove',e=>{
  if(!drag||!e.touches.length)return;
  ry+=(e.touches[0].clientX-mx)*.009;rx+=(e.touches[0].clientY-my)*.007;
  rx=Math.max(-1.3,Math.min(1.3,rx));mx=e.touches[0].clientX;my=e.touches[0].clientY;
},{passive:true});

const pivot=new THREE.Group();sc.add(pivot);
function cbupd(){
  const a=+document.getElementById('cba').value;
  const b=+document.getElementById('cbb').value;
  document.getElementById('cbav').textContent=a;
  document.getElementById('cbbv').textContent=b;
  buildCube(a,b);
}

let autoRot=true;el.addEventListener('mousedown',()=>autoRot=false);
function anim(){
  requestAnimationFrame(anim);
  if(autoRot)ry+=.005;
  const cs=Math.cos(rx),sn=Math.sin(rx),cy=Math.cos(ry),sy=Math.sin(ry);
  const pos=new THREE.Vector3(
    16*(sy*cs),
    16*sn,
    16*(cy*cs)
  );
  pos.add(new THREE.Vector3(2,2,2));
  cm.position.copy(pos);
  cm.lookAt(2,2,2);
  ren.render(sc,cm);
}
anim();cbupd();
window.addEventListener('resize',()=>{const nw=cont.clientWidth;ren.setSize(nw,H);cm.aspect=nw/H;cm.updateProjectionMatrix();});
</script>
